<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Word Kitty</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="stylesheet" href="./CSS/avatares.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <div id="loadingScreen" class="loading-screen">
        <div class="loader-content">
            <div id="imagenCarga" class="pantalla-carga-base CargaKitty-page"></div>
            <div class="spinner"></div>
            <p> Cargando... </p>
        </div>
    </div>

    <div id="storyContainer" class="story-container"></div>

    <div class="success-screen" id="successScreen" style="display: none;">
        <div class="party-lights"></div>
        <h2></h2>
        <p class="highlight"></p>
        <p> 😎</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>

    <script type="module">
        // 1. Generamos la versión para evitar el caché (Cache-busting)
        const version = Date.now();

        // 2. Importamos DINÁMICAMENTE solo el archivo Orquestador.
        // El navegador leerá sus 'import' y descargará el resto automáticamente.
        import(`./AppOrchestrator.js?v=${version}`)
            .then((modulo) => {
                console.log("Cargador: Orquestador y dependencias listos. ¡Encendiendo!");

                // 3. Instanciamos extrayendo la clase del módulo importado
                // IMPORTANTE: Asegúrate de que en AppOrchestrator.js tengas: export class AppOrchestrator
                window.orquestador = new modulo.AppOrchestrator("storyContainer");

                // 4. Ocultamos tu pantalla de carga nativa con GSAP
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) {
                    gsap.to(loadingScreen, {
                        opacity: 0,
                        duration: 0.5,
                        onComplete: () => loadingScreen.style.display = 'none'
                    });
                }

                // 5. GIRAMOS LA LLAVE: Forzamos el arranque en el Nivel 1 (Lobby)
                window.orquestador.transitionTo(1);
            })
            .catch((err) => {
                // Si algún import falla (ej: error de sintaxis o archivo no encontrado), lo atrapamos aquí
                console.error("Error crítico cargando los módulos del juego:", err);
                const loadingText = document.querySelector('.loader-content p');
                if (loadingText) loadingText.innerText = "Error cargando el juego :(";
            });
    </script>
</body>
</html>
