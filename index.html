<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Word Kitty</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="stylesheet" href="./CSS/avatares.css">
    <link rel="icon" href="data:,">
</head>

<body>

    <div id="loadingScreen" class="loading-screen">
        <div class="loader-content">
            <div id="imagenCarga" class="pantalla-carga-base CargaKitty-page"></div>
            <div class="spinner"></div>
            <p> Cargando... </p>
        </div>
    </div>

    <div id="storyContainer" class="story-container"></div>

    <div class="success-screen" id="successScreen" style="display: none;">
        <div class="party-lights"></div>
        <h2>¡Códig 🚀</h2>
        <p class="highlight"></p>
        <p> 😎</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script>
        (function () {
            const version = Date.now();
            const scriptsAInyectar = [
                "./Niveles/levels.js",
                "./Niveles/Nivel_1.js",
                "./Service/GameFactory.js",
                "./Service/AudioManager.js",
                "AppOrchestrator.js"
            ];

            let scriptsCargados = 0; // Nuestro contador de descargas

            scriptsAInyectar.forEach(src => {
                let scriptEl = document.createElement('script');
                scriptEl.src = src + "?v=" + version;
                scriptEl.async = false;

                // 🔥 LA IGNICIÓN: ¿Qué hacer cuando ESTE archivo termine de bajar?
                scriptEl.onload = () => {
                    scriptsCargados++;

                    // Si ya cargaron todos los de la lista...
                    if (scriptsCargados === scriptsAInyectar.length) {
                        console.log("Cargador: Todos los scripts listos. ¡Encendiendo el Orquestador!");

                        // GIRAMOS LA LLAVE
                        window.juego = new AppOrchestrator();

                        // OJO: Si tu Orquestador necesita un método para arrancar, 
                        // como window.juego.init() o window.juego.start(), descomentalo acá abajo:
                        // window.juego.init(); 
                    }
                };

                document.body.appendChild(scriptEl);
            });
        })();
    </script>
</body>

</html>
